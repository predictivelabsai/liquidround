version: "3.8"

services:
  liquidround:
    build: .
    container_name: liquidround
    restart: unless-stopped
    ports:
      - "5007:5007"
    environment:
      - ENVIRONMENT=production
      - PORT=5007
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o-mini}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.7}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DB_URL=${DB_URL:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-liquidround-prod-secret}
      - CH_API_KEY=${CH_API_KEY:-}
    volumes:
      - ./uploads:/app/uploads
      - ./docs:/app/docs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5007/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

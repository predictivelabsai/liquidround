version: "3.8"

services:
  liquidround:
    build: .
    container_name: liquidround
    restart: unless-stopped
    ports:
      - "5007:5007"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5007/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
